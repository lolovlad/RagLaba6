# CPU-стек: API на python:3.12-slim, PyTorch из Poetry (обычно CPU-колёса).
services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      OCR_USE_GPU: "false"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_storage:
