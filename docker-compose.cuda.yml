# GPU-стек: API на CUDA 12.8 + torch 2.7.1+cu128 (Dockerfile.cuda).
# Требуется: NVIDIA Driver + NVIDIA Container Toolkit на хосте.
services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  api:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      OCR_USE_GPU: "true"
    # Иначе внутри контейнера часто падает резолв внешних хостов (Yandex LLM и т.д.)
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      - qdrant
    restart: unless-stopped
    gpus: all

volumes:
  qdrant_storage:
